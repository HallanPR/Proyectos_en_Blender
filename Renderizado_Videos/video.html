<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Galería de Videos · Blender</title>

    <style>
        /* ========== RESET Y BASE ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0b0a0f;
            min-height: 100vh;
            padding: 40px 20px;
            position: relative;
        }

        /* Fondo con cuadrícula sutil */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(60, 180, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(60, 180, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 650px; /* Reducido para que el video sea más pequeño */
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* ========== HEADER ========== */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 32px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(80, 180, 255, 0.08);
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            background: linear-gradient(135deg, #e0eeff, #b0d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.3px;
            text-align: center;
            flex: 1;
        }

        .btn-volver {
            display: inline-block;
            padding: 6px 20px;
            background: rgba(60, 120, 255, 0.1);
            color: #b0cce0;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            border: 1px solid rgba(80, 180, 255, 0.15);
        }

        .btn-volver:hover {
            background: rgba(60, 120, 255, 0.2);
            border-color: rgba(80, 180, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(60, 120, 255, 0.1);
            color: #e0f0ff;
        }

        /* ========== TARJETA DE VIDEO ========== */
        .video-card {
            background: rgba(18, 16, 26, 0.85);
            backdrop-filter: blur(4px);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(80, 180, 255, 0.08);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: border-color 0.35s ease, box-shadow 0.35s ease;
            margin-bottom: 24px;
        }

        .video-card:hover {
            border-color: rgba(80, 180, 255, 0.25);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7), 0 0 30px rgba(60, 120, 255, 0.05);
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 */
            background: #000;
        }

        .video-wrapper video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            border: none;
            background: #0a0a0a;
        }

        .card-body {
            padding: 16px 20px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .card-body .nombre {
            font-weight: 500;
            color: #d0dce8;
            font-size: 0.95rem;
            letter-spacing: 0.3px;
        }

        .btn-descargar {
            display: inline-block;
            padding: 6px 18px;
            background: rgba(45, 95, 106, 0.3);
            color: #b0d8e0;
            border-radius: 40px;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            border: 1px solid rgba(80, 200, 220, 0.1);
        }

        .btn-descargar:hover {
            background: rgba(45, 140, 160, 0.25);
            border-color: rgba(80, 200, 220, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(45, 140, 160, 0.15);
            color: #e0f8ff;
        }

        .footer {
            margin-top: 32px;
            text-align: center;
            color: #6a7a8a;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
            border-top: 1px solid rgba(80, 180, 255, 0.06);
            padding-top: 16px;
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 700px) {
            .container {
                max-width: 100%;
            }
            header h1 {
                font-size: 1.5rem;
            }
            .btn-volver {
                padding: 6px 14px;
                font-size: 0.7rem;
            }
            .card-body {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>Galería de Videos</h1>
            <a href="../index.html" class="btn-volver">Volver</a>
        </header>

        <!-- ========================================================= -->
        <!--  TARJETA 1 - Gallo Claudio                                -->
        <!-- ========================================================= -->
        <div class="video-card">
            <div class="video-wrapper">
                <video controls preload="metadata">
                    <source src="video/video_claudio.mp4" type="video/mp4" />
                    Tu navegador no soporta la reproducción de video.
                </video>
            </div>
            <div class="card-body">
                <span class="nombre">Gallo Claudio</span>
                <a href="../Archivos_blender/Gallo_Claudio.zip" class="btn-descargar" download>Descargar proyecto</a>
            </div>
        </div>

        <!-- ========================================================= -->
        <!--  TARJETA 2 - Clay City (corregida)                        -->
        <!-- ========================================================= -->
        <div class="video-card">   <!-- antes era video-card1 -->
            <div class="video-wrapper">
                <video controls preload="metadata">
                    <source src="video/VID-20260715-WA0148.mp4" type="video/mp4" />
                    Tu navegador no soporta la reproducción de video.
                </video>
            </div>
            <div class="card-body">
                <span class="nombre">Clay City</span>   <!-- nombre corregido -->
                <a href="../Archivos_blender/Clay_City_Free_Pack.zip" class="btn-descargar" download>Descargar proyecto</a>
            </div>
        </div>

        <div class="footer">
            Haz clic en "Descargar proyecto" para obtener los archivos relacionados.
        </div>
    </div>
</body>
</html>
