<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Galería de Imágenes · Blender</title>

    <style>
        /* ========== RESET Y BASE ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0b0a0f;
            min-height: 100vh;
            padding: 40px 20px;
            position: relative;
        }

        /* Fondo con cuadrícula sutil */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(60, 180, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(60, 180, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* ========== HEADER ========== */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(80, 180, 255, 0.08);
        }

        header h1 {
            font-size: 2rem;
            font-weight: 600;
            background: linear-gradient(135deg, #e0eeff, #b0d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.3px;
            text-align: center;
            flex: 1;
        }

        .btn-volver {
            display: inline-block;
            padding: 8px 24px;
            background: rgba(60, 120, 255, 0.1);
            color: #b0cce0;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            border: 1px solid rgba(80, 180, 255, 0.15);
        }

        .btn-volver:hover {
            background: rgba(60, 120, 255, 0.2);
            border-color: rgba(80, 180, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(60, 120, 255, 0.1);
            color: #e0f0ff;
        }

        /* ========== CUADRICULA DE TARJETAS ========== */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 10px;
        }

        .card {
            background: rgba(18, 16, 26, 0.85);
            backdrop-filter: blur(4px);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(80, 180, 255, 0.08);
            transition: transform 0.35s ease, box-shadow 0.35s ease, border-color 0.35s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: rgba(80, 180, 255, 0.25);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7), 0 0 30px rgba(60, 120, 255, 0.05);
        }

        .card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
            border-bottom: 1px solid rgba(80, 180, 255, 0.06);
        }

        .card-body {
            padding: 18px 20px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .card-body .nombre {
            font-weight: 500;
            color: #d0dce8;
            font-size: 0.95rem;
            letter-spacing: 0.3px;
        }

        .btn-descargar {
            display: inline-block;
            padding: 6px 18px;
            background: rgba(45, 95, 106, 0.3);
            color: #b0d8e0;
            border-radius: 40px;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            border: 1px solid rgba(80, 200, 220, 0.1);
        }

        .btn-descargar:hover {
            background: rgba(45, 140, 160, 0.25);
            border-color: rgba(80, 200, 220, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(45, 140, 160, 0.15);
            color: #e0f8ff;
        }

        .footer {
            margin-top: 50px;
            text-align: center;
            color: #6a7a8a;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
            border-top: 1px solid rgba(80, 180, 255, 0.06);
            padding-top: 20px;
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 600px) {
            header {
                flex-direction: column;
                align-items: center;
            }
            header h1 {
                font-size: 1.6rem;
                text-align: center;
            }
            .grid {
                grid-template-columns: 1fr;
            }
            .card img {
                height: 180px;
            }
            .btn-volver {
                padding: 6px 16px;
                font-size: 0.75rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>Galería de Imágenes</h1>
            <a href="../index.html" class="btn-volver">Volver</a>
        </header>

        <div class="grid">

            <!-- Calabaza -->
            <div class="card">
                <img src="img/calabaza.jpeg" alt="Calabaza" loading="lazy" />
                <div class="card-body">
                    <span class="nombre">Calabaza</span>
                    <a href="../Archivos_blender/Calabaza.zip" class="btn-descargar" download>Descargar proyecto</a>
                </div>
            </div>

            <!-- Herramientas -->
            <div class="card">
                <img src="img/Herramientas.png" alt="Herramientas" loading="lazy" />
                <div class="card-body">
                    <span class="nombre">Herramientas</span>
                    <a href="../Archivos_blender/HERRAMIENTAS.zip" class="btn-descargar" download>Descargar proyecto</a>
                </div>
            </div>

            <!-- Hongos PvZ -->
            <div class="card">
                <img src="img/Hongos_PvZ.png" alt="Hongos PvZ" loading="lazy" />
                <div class="card-body">
                    <span class="nombre">Hongos PvZ</span>
                    <a href="../Archivos_blender/Hongos_PvZ.zip" class="btn-descargar" download>Descargar proyecto</a>
                </div>
            </div>

            <div class="card">
                <img src="img/planta.png" alt="Hongos PvZ" loading="lazy" />
                <div class="card-body">
                    <span class="nombre">Hongos PvZ</span>
                    <a href="../Archivos_blender/Hongos_PvZ.zip" class="btn-descargar" download>Descargar proyecto</a>
                </div>
            </div>

        </div>

        <div class="footer">
            Haz clic en "Descargar proyecto" para obtener el archivo ZIP correspondiente.
        </div>
    </div>
</body>
</html>
